<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    .box
    {
    height: 100px;
    width: 100px;
    background-color: rgb(255, 115, 0);
    margin: 10px;
    text-align: center;
    border: 1px solid rgb(149, 0, 149);
    border-radius: 10%;
    display: inline-block
    }
  </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inline Element </title>
</head>
<body>
  <div class="box">box4</div>
  <div class="box">box4</div>
  <div class="box">box4</div>
  <div class="box">box4</div>
</body>
</html>
