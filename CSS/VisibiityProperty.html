<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    .box
    {
      height: 100px;
      width: 100px;
    }
    #visibility1
    {
      background-color: green;
      visibility: hidden;
    }
    
    #visibility2
    {
      background-color: red;
    }
  </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>visibility</title>
</head>
<body>
  <div id="visibility1" class="box">box1</div>
  <div id="visibility2" class="box">box2</div>
</body>
</html>
