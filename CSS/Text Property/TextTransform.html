<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    #box1
    {
    text-transform: uppercase;
    }
    #box2
    {
    text-transform: lowercase;
    }
    #box3
    {
    text-transform: capitalize;
    }
    #box4
    {
    text-transform: none;
    }
  </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h2 id="box1">box1</h2>
  <h2 id="box2">box2</h2>
  <h2 id="box3">box3</h2>
  <h2 id="box4">box4</h2>
</body>
</html>
